<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Todo App</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <style>
        dialog {
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* Style the backdrop overlay */
        dialog::backdrop {
            background-color: rgba(0, 0, 0, 0.4);
        }
    </style>
    <script>
        console.log("Hello Todo App!")

        /*Title, Description, Status, CreatedDate, UpdatedDate, ID, DueDate, Priority*/
        var todoList = []

        function addTodoFunction()
        {
            console.log("Add todo called")
            let inputText = document.getElementById("todoInputID").value
            let todoDescID = document.getElementById("todoDescID").value
            let todoStatusID = document.getElementById("todoStatusID").value
            let todoCompletionID = document.getElementById("todoCompletionID").value
            let todoPriorityID = document.getElementById("todoPriorityID").value
            let todoDueDateID = document.getElementById("todoDueDateID").value
            // console.log("inputText: ", inputText)
            // console.log("todoDescID: ", todoDescID)
            // console.log("todoStatusID: ", todoStatusID)
            // console.log("todoCompletionID: ", todoCompletionID)
            // console.log("todoPriorityID: ", todoPriorityID)
            // console.log("todoDueDateID: ", todoDueDateID)
            console.log("Current Date time: ", Date.now())
            if(inputText)
            {
                console.log("inputText:", inputText)
                todoList.push({
                    ID:1,
                    title:inputText,
                    description:todoDescID,
                    completionStatus:todoCompletionID,
                    createdDate: Date.now(),
                    updatedDate: Date.now(),
                    dueDate:todoDueDateID,
                    priority:todoPriorityID,
                    todoStatus:todoStatusID
                })
                console.log("TodoList:", todoList)
                document.getElementById("todoInputID").value = ""

                let todoListID = document.getElementById("todoListID")
                todoListID.innerHTML = todoListID.innerHTML + "<li> <input type='checkbox'>"+inputText+"</li>"
            }
            else
            {
                alert("Todo title cannot be blank!")
            }
        }

        function showDialog()
        {
            let addTodoDialog = document.getElementById("addTodoDialog")
            addTodoDialog.showModal()
        }

    </script>
</head>
<body>
    <h1>Todo App</h1>
    <br>
    <button onclick="showDialog()">Add Todo</button><br><br>
    <ul id="todoListID">
        <li> 
            <div style="display: inline-flex;">
                <input type="checkbox"> 
                <div style="margin-left: 10px;">
                    <b>Buy Groceries</b><br>
                    <small>Description comes here...</small>
                </div>
            </div>
        </li>
        <li>Complete Homework</li>
    </ul>

    <dialog id="addTodoDialog">

        <center> <h2>Add a Todo</h2></center>

        <!-- <form> -->
            <label>Todo Title:</label>
            <input id="todoInputID" placeholder="Enter Todo Title here..."/>
            <br><br>
            <label>Todo Description:</label>
            <input id="todoDescID" placeholder="Enter Todo Description here..."/>
            <br><br>
            <input type="checkbox" id="todoCompletionID" />
            <label>Todo Status:</label>
            <br><br>
            <label>Todo Status:</label>
            <select id="todoStatusID">
                <option>Todo</option>
                <option>In-Progress</option>
                <option>In-Review</option>
                <option>Done</option>
            </select>
            <br><br>
            <label>Todo Priority:</label>
            <select id="todoPriorityID">
                <option>High</option>
                <option>Medium</option>
                <option>Low</option>
            </select>
            <br><br>
            <label>Todo Due Date:</label>
            <input type="date" id="todoDueDateID"/>
            <br><br>

            <center><button onclick="addTodoFunction()">Add Todo</button><br><br></center>
        <!-- </form> -->
    </dialog>
</body>
</html>
