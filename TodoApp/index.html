<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Todo App</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <script>
        console.log("Hello Todo App!")

        /*Title, Description, Status, CreatedDate, UpdatedDate, ID, DueDate, Priority*/
        var todoList = []

        function addTodoFunction()
        {
            console.log("Add todo called")
            let inputText = document.getElementById("todoInputID").value
            console.log("inputText:", inputText)
            todoList.push({
                ID:1,
                title:inputText,
                description:"",
                status:"",
                createdDate:"",
                updatedDate:"",
                dueDate:"",
                priority:""
            })
            console.log("TodoList:", todoList)
        }
    </script>
</head>
<body>
    <h1>Todo App</h1>
    <br>
    <input id="todoInputID" placeholder="Enter Todo Title here..."/>
    <br>
    <button onclick="addTodoFunction()">Add Todo</button>
</body>
</html>
